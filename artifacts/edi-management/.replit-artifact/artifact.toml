kind = "web"
previewPath = "/"
title = "EDI Management System"
version = "1.0.0"
id = "artifacts/edi-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18242

[services.development]
run = "pnpm --filter @workspace/edi-management run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edi-management", "run", "build" ]
publicDir = "artifacts/edi-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18242"
BASE_PATH = "/"
